server.port=8080
spring.application.name=dev-tinder
spring.datasource.url=jdbc:postgresql://localhost:5432/devtinder
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always

app.jwt.secret=dev-tinder-hackathon-local-secret-change-this-before-production-2026
app.jwt.expiration-minutes=1440
app.rate-limit.requests-per-minute=60
