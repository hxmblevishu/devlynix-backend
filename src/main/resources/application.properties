server.port=8080
spring.application.name=dev-tinder
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=${SQL_INIT_MODE:always}

app.jwt.secret=${JWT_SECRET:dev-tinder-hackathon-local-secret-change-this-before-production-2026}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}
app.rate-limit.requests-per-minute=${RATE_LIMIT_REQUESTS_PER_MINUTE:60}
app.cors.allowed-origins=${FRONTEND_ORIGINS:http://localhost:3000}
